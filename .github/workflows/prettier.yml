name: Check Format

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0
          clean: true

      - uses: actions/setup-node@v3.8.1
        with:
          node-version: 18.x
      
      - name: Install 🔧
        run: npm install
      
      - name: Check Format
        run: npm run check-format
